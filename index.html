<body>
    <div class="hero">
        <img src="assets/Gradixy.png" alt="Gradixy">

        <div class="header">
            <h1>Gradixy Gradient Generator</h1>

        </div>

        <div class="main-content">
            <div class="panel">
                <h2>Gradient Preview and Code Output</h2>

                <div id="gradientPreview" class="preview-area"></div>

                <h3 style="margin-bottom: 10px; color: #ffffff;">CSS Gradient Code</h3>

            </div>

            <div class="panel">
                <h2>Customize Gradient</h2>

                <button id="randomBtn" class="random-btn">Generate Random Gradient</button>

                <div class="controls-section">
                    <label>Gradient Type:</label>
                    <div class="type-selector">
                        <button class="type-btn active" data-type="linear">Linear</button>
                        <button class="type-btn" data-type="radial">Radial</button>
                        <button class="type-btn" data-type="conic">Conic</button>
                    </div>
                </div>

                <div class="controls-section">
                    <label>Angle: <span id="angleDisplay">90</span>°</label>
                    <input type="range" id="angleSlider" class="slider" min="0" max="360" value="90">
                </div>

                <div class="controls-section">
                    <label>Color Stops:</label>
                    <div id="colorStopsContainer"></div>
                    <button id="addColorBtn" class="add-color-btn">Add Color + </button>
